<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MiniPlayer</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
    <style>
        .track { cursor: pointer; padding: 10px; border-bottom: 1px solid #444; }
        .track:hover { background: #333; }
        footer { position: fixed; bottom: 0; left: 0; width: 100%; background: #111; padding: 15px; text-align: center; }
    </style>
</head>
<body>
    <h1>Library</h1>
    <div id="list">
        {% for track in tracks %}
        <div class="track" data-id="{{ track.id }}" data-title="{{ track.title }}">
            <strong>{{ track.title }}</strong> - {{ track.artist }} <small>({{ track.album }})</small>
        </div>
        {% endfor %}
    </div>
    <footer>
        <b id="playing">Select a song</b><br>
        <audio id="audio" controls autoplay style="width: 90%; margin-top: 10px;"></audio>
    </footer>
    <script>
        function play(id, title) {
            const a = document.getElementById('audio');
            document.getElementById('playing').innerText = title;
            a.src = `/rest/stream.view?id=${id}`;
            a.play();
        }

        document.querySelectorAll('.track').forEach((track) => {
            track.addEventListener('click', () => {
                play(track.dataset.id, track.dataset.title);
            });
        });
    </script>
</body>
</html>
